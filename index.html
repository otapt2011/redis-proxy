<body class="bg-slate-100 p-4"><div class="max-w-3xl mx-auto bg-white rounded-2xl shadow p-6"><h1 class="text-3xl font-bold text-red-600">⚡ Redis Proxy (Upstash)</h1><p class="text-slate-500 mt-1">REST API for Redis commands.</p><hr class="my-4"><h2 class="text-xl font-semibold">📡 Endpoint</h2><div><code class="bg-slate-200 px-2 py-1 rounded">POST /api/redis</code><p>Body: <code>{"command":"get","key":"mykey"}</code> or <code>{"command":"set","key":"mykey","value":"hello","ttl":60}</code></p><p>Supported commands: get, set, del, incr.</p></div><hr class="my-4"><h2 class="text-xl font-semibold">🔑 Authentication</h2><p>Requires <code>X-API-Key</code> header.</p><p class="mt-2">👉 <a href="/redis-proxy.html" class="text-blue-600 underline">Open interactive tester →</a></p></div></body></html>
